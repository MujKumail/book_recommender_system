<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Recommender System</title>
    <!-- Latest compiled and minified CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
</head>
<style>
    .text-white{
        color:white
    }

    .book-card {
    background-color: #1e1e1e;
    border-radius: 12px;
    overflow: hidden;
    height: 430px;
    transition: 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

.book-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
}

.book-img {
    height: 250px;
    width: 100%;
    object-fit: contain;
    background-color: #111;
}

.book-body {
    padding: 15px;
}

.book-title {
    font-size: 15px;
    font-weight: 600;
    color: white;
    min-height: 40px;
}

.book-author {
    font-size: 13px;
    color: #bbbbbb;
    margin-bottom: 6px;
}

.book-meta {
    font-size: 12px;
    color: #dddddd;
}

.rating-badge {
    background-color: #00a65a;
    padding: 4px 8px;
    border-radius: 20px;
    font-size: 12px;
    display: inline-block;
    margin-top: 5px;
}

.custom-navbar {
    background: linear-gradient(90deg, #00a65a, #008d4c);
    border: none;
    border-radius: 0;
    padding: 10px 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}

.navbar-brand {
    color: white !important;
    font-weight: bold;
    font-size: 20px;
    letter-spacing: 1px;
}

.navbar-nav > li > a {
    color: white !important;
    font-weight: 500;
    transition: 0.3s ease;
}

.navbar-nav > li > a:hover {
    background-color: rgba(255,255,255,0.15);
    border-radius: 20px;
}

.navbar-nav > .active > a {
    background-color: rgba(0,0,0,0.2) !important;
    border-radius: 20px;
}

</style>
<body style="background: linear-gradient(135deg, #0f0f0f, #1a1a1a);">


    <nav class="navbar custom-navbar">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" href="/">📚 Book Recommender</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li class="{% if request.path == '/' %}active{% endif %}">
                <a href="/">Home</a>
            </li>
            <li class="{% if request.path == '/recommend' %}active{% endif %}">
                <a href="/recommend">Recommend</a>
            </li>
            <li>
                <a href="/contact">Contact</a>
            </li>
        </ul>
    </div>
</nav>


    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text-white" style="font-size:50px">Top 50 Books</h1>
            </div>

            {% for i in range(book_name|length) %}
                <div class="col-md-3" style="margin-top:30px;">
    <div class="book-card">

        <img class="book-img"
             src="{{ image[i] if image[i] else 'https://via.placeholder.com/150x220?text=No+Image' }}">

        <div class="book-body">

            <div class="book-title">
                {{ book_name[i][:45] }}{% if book_name[i]|length > 45 %}...{% endif %}
            </div>

            <div class="book-author">
                {{ author[i] }}
            </div>

            <div class="book-meta">
                Votes: {{ votes[i] }}
            </div>

            <div class="rating-badge">
                ⭐ {{ "%.2f"|format(rating[i]) }}
            </div>

        </div>
    </div>
</div>


            {% endfor %}


        </div>
    </div>

</body>
</html>
